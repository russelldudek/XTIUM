name: Materialize approved hero repair

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  materialize:
    if: github.event.pull_request.head.ref == 'hero-translation-fix' && github.event.pull_request.head.sha == '8a73a9203dff1fe9dff211d60ab2e9f20cabc179'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hero-translation-fix
          fetch-depth: 0
      - name: Apply approved visual correction
        shell: bash
        run: |
          set -euo pipefail
          python .payload/apply_hero_fix.py
          rm -rf .payload
          rm -f hero-repair-trigger.txt hero-repair-pr-note.md
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          css = Path('styles.css').read_text(encoding='utf-8')
          assert 'class="register translation-spine ready"' in html
          assert html.count('class="spec-row"') == 8
          assert 'Why the experience transfers' in html
          assert 'class="objection"' not in html
          footer = re.search(r'<footer class="footer">(.*?)</footer>', html, re.S)
          assert footer and '<img' not in footer.group(1)
          assert 'XTIUM SERVICE TRANSLATION SPINE' in css
          print('Source-level hero repair checks passed.')
          PY
          if ! command -v pdfinfo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils
          fi
          python scripts/publication_qa.py
      - name: Commit verified source files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement approved XTIUM service translation hero [skip ci]"
          git push origin HEAD:hero-translation-fix
