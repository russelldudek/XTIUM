name: Verify XTIUM print artifacts live

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Verify exact live artifacts
        id: verify
        shell: bash
        env:
          BASE_URL: https://russelldudek.github.io/XTIUM/
        run: |
          set -euo pipefail
          if ! command -v pdfinfo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils
          fi
          files=(
            resume.html
            service-definition-canvas.html
            artifact-layout.css
            docs/Russell-Dudek-XTIUM-Resume.pdf
            docs/XTIUM-AI-Enabled-Service-Definition-Canvas.pdf
          )
          synchronized=false
          for attempt in $(seq 1 60); do
            rm -rf /tmp/live
            mkdir -p /tmp/live/docs
            matched=true
            for file in "${files[@]}"; do
              if ! curl -fsSL "${BASE_URL}${file}?sha=${GITHUB_SHA}&attempt=${attempt}" -o "/tmp/live/${file}"; then
                matched=false
                break
              fi
              if ! cmp -s "$file" "/tmp/live/${file}"; then
                matched=false
                break
              fi
            done
            if [ "$matched" = true ]; then
              synchronized=true
              break
            fi
            sleep 10
          done
          test "$synchronized" = true
          test "$(pdfinfo /tmp/live/docs/Russell-Dudek-XTIUM-Resume.pdf | awk '/^Pages:/{print $2}')" = "2"
          test "$(pdfinfo /tmp/live/docs/XTIUM-AI-Enabled-Service-Definition-Canvas.pdf | awk '/^Pages:/{print $2}')" = "1"
          echo 'Exact live artifact verification passed.'
      - name: Record verification outcome
        if: always()
        shell: bash
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          VERIFIED_MAIN: ${{ github.sha }}
        run: |
          set -euo pipefail
          git fetch origin resume-canvas-density-fix
          git checkout -B resume-canvas-density-fix origin/resume-canvas-density-fix
          printf 'verified_main_commit=%s\nverified_utc=%s\nverification_outcome=%s\nresume_pages=2\ncanvas_pages=1\n' "$VERIFIED_MAIN" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$VERIFY_OUTCOME" > live-artifact-verification.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add live-artifact-verification.txt
          git commit -m "Record live print artifact verification: ${VERIFY_OUTCOME} [skip ci]"
          git push origin HEAD:resume-canvas-density-fix
