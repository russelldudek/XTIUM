name: Materialize complete campaign

on:
  push:
    branches:
      - publication-fix

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: publication-fix
          fetch-depth: 0
      - name: Reconstruct publication package
        shell: bash
        run: |
          set -euo pipefail
          cat .payload/part-* | base64 --decode > /tmp/xtium-campaign.zip
          unzip -t /tmp/xtium-campaign.zip
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github ! -name .payload -exec rm -rf {} +
          unzip -o /tmp/xtium-campaign.zip -d .
          rm -rf .payload
          rm -f .github/workflows/materialize.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          python scripts/publication_qa.py
      - name: Commit complete campaign
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish complete XTIUM candidate vision [skip ci]"
          git push origin HEAD:publication-fix
