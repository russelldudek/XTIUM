name: Check live browser values

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    if: github.event.pull_request.head.ref == 'live-audit-trigger'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Chromium quietly
        run: npm init -y >/dev/null 2>&1 && npm install --silent playwright@1.55.0 && npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Print live browser values
        env:
          DEPLOY_URL: https://russelldudek.github.io/XTIUM/
        run: node -e 'const {chromium}=require("playwright");(async()=>{const b=await chromium.launch({headless:true});for(const [n,w,h] of [["desktop",1440,900],["laptop",1280,800],["tablet",768,1024],["mobile",390,844]]){const c=await b.newContext({viewport:{width:w,height:h}}),p=await c.newPage(),e=[];p.on("console",m=>{if(m.type()==="error")e.push("console:"+m.text())});p.on("pageerror",x=>e.push("pageerror:"+x.message));const r=await p.goto(process.env.DEPLOY_URL,{waitUntil:"networkidle"});const a=await p.evaluate(()=>{const b=getComputedStyle(document.body),h=getComputedStyle(document.querySelector(".hero")),t=getComputedStyle(document.querySelector(".hero h1")),nav=getComputedStyle(document.querySelector(".site-nav"));return{font:b.fontFamily,display:h.display,size:t.fontSize,nav:nav.position,sheets:[...document.styleSheets].map(s=>s.href||"inline"),sw:document.documentElement.scrollWidth,cw:document.documentElement.clientWidth}});console.log(n,JSON.stringify({status:r&&r.status(),actual:a,errors:e}));if(n==="desktop"){console.log("tabs",JSON.stringify(await p.getByRole("tab").allTextContents()));console.log("before",await p.locator("#scenario-title").textContent());try{await p.getByRole("tab",{name:"Managed AI agent"}).click();console.log("after",await p.locator("#scenario-title").textContent())}catch(x){console.log("clickError",x.message)}}await c.close()}const c=await b.newContext({viewport:{width:1440,height:900},reducedMotion:"reduce"}),p=await c.newPage();await p.goto(process.env.DEPLOY_URL,{waitUntil:"networkidle"});console.log("reduced",JSON.stringify(await p.locator(".plate").first().evaluate(el=>({duration:getComputedStyle(el).transitionDuration,transform:getComputedStyle(el).transform}))));await c.close();await b.close()})().catch(e=>{console.error("FATAL",e);process.exit(1)})'
